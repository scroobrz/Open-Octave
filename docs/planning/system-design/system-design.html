<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Octave — System Design</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #f5f5f7; color: #1a1a2e; padding: 40px; line-height: 1.6; }
  h1 { font-size: 2rem; font-weight: 700; color: #111; margin-bottom: 8px; }
  h2 { font-size: 1.4rem; font-weight: 600; color: #111; margin: 48px 0 16px; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
  .diagram-container { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 32px; margin: 16px 0 32px; overflow-x: auto; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  svg { display: block; margin: 0 auto; }
  svg text { font-family: 'Inter', sans-serif; }
  svg .mono { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>

<h1>Open Octave — System Design</h1>

<!-- ============================================================ -->
<h2>1. Current Architecture (Single Module)</h2>
<!-- ============================================================ -->

<div class="diagram-container">
<svg viewBox="0 0 780 300" width="780" height="300">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#888"/></marker>
    <marker id="a1p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#7c3aed"/></marker>
    <marker id="a1b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
  </defs>

  <!-- ── Controller box ── -->
  <rect x="30" y="30" width="260" height="150" rx="10" fill="#f3f0ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="160" y="22" text-anchor="middle" fill="#5b21b6" font-size="12" font-weight="600">CONTROLLER (Node.js)</text>

  <rect x="50" y="52" width="105" height="34" rx="6" fill="#ede9fe"/>
  <text x="102" y="74" text-anchor="middle" fill="#4c1d95" font-size="11">Express API</text>
  <rect x="165" y="52" width="105" height="34" rx="6" fill="#ede9fe"/>
  <text x="217" y="74" text-anchor="middle" fill="#4c1d95" font-size="11">WS Client</text>

  <rect x="50" y="100" width="105" height="34" rx="6" fill="#e8edf4"/>
  <text x="102" y="122" text-anchor="middle" fill="#334155" font-size="11">Serial Port</text>
  <rect x="165" y="100" width="105" height="34" rx="6" fill="#e8edf4"/>
  <text x="217" y="122" text-anchor="middle" fill="#334155" font-size="11">Cmd Translate</text>

  <text x="160" y="168" text-anchor="middle" fill="#888" font-size="10" class="mono">server.js</text>

  <!-- ── ESP32 box ── -->
  <rect x="490" y="30" width="260" height="150" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="620" y="22" text-anchor="middle" fill="#1d4ed8" font-size="12" font-weight="600">ESP32 FIRMWARE</text>

  <rect x="510" y="52" width="220" height="30" rx="6" fill="#dbeafe"/>
  <text x="620" y="72" text-anchor="middle" fill="#1e3a5f" font-size="11">WS Server (:81)</text>
  <rect x="510" y="92" width="220" height="30" rx="6" fill="#dbeafe"/>
  <text x="620" y="112" text-anchor="middle" fill="#1e3a5f" font-size="11">processSerialCommand()</text>
  <rect x="510" y="132" width="220" height="30" rx="6" fill="#dbeafe"/>
  <text x="620" y="152" text-anchor="middle" fill="#1e3a5f" font-size="11">Playback Engine</text>

  <text x="620" y="172" text-anchor="middle" fill="#888" font-size="10" class="mono">firmware_v4.ino</text>

  <!-- ── WebSocket: Controller → ESP32 ── -->
  <line x1="290" y1="65" x2="485" y2="65" stroke="#7c3aed" stroke-width="2" marker-end="url(#a1p)"/>
  <text x="390" y="57" text-anchor="middle" fill="#5b21b6" font-size="10" font-weight="500">WebSocket</text>
  <text x="390" y="80" text-anchor="middle" fill="#7c3aed" font-size="9" class="mono">'m' 'a' 'f' 's' 'x'</text>

  <!-- ── Log stream: ESP32 → Controller ── -->
  <line x1="485" y1="107" x2="295" y2="107" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a1b)"/>
  <text x="390" y="100" text-anchor="middle" fill="#1d4ed8" font-size="9">Log stream</text>

  <!-- ── USB Serial: Controller → ESP32 ── -->
  <line x1="290" y1="145" x2="485" y2="145" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#a1)"/>
  <text x="390" y="140" text-anchor="middle" fill="#666" font-size="9">USB Serial (alternative)</text>

  <!-- ── Hardware block ── -->
  <rect x="490" y="210" width="260" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="540" y="235" text-anchor="middle" fill="#475569" font-size="10">🔘 Buttons</text>
  <text x="620" y="235" text-anchor="middle" fill="#475569" font-size="10">💡 LEDs</text>
  <text x="700" y="235" text-anchor="middle" fill="#475569" font-size="10">⚙️ Servos</text>
  <text x="570" y="257" text-anchor="middle" fill="#475569" font-size="10">🔊 Speaker</text>
  <text x="670" y="257" text-anchor="middle" fill="#475569" font-size="10">PCA9685</text>

  <!-- ESP32 → Hardware -->
  <line x1="620" y1="180" x2="620" y2="205" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a1)"/>
</svg>
</div>


<!-- ============================================================ -->
<h2>2. Target Architecture (Production / Multi-Module)</h2>
<!-- ============================================================ -->

<div class="diagram-container">
<svg viewBox="0 0 940 540" width="940" height="540">
  <defs>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#888"/></marker>
    <marker id="a2p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#7c3aed"/></marker>
    <marker id="a2y" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#d97706"/></marker>
  </defs>

  <!-- ── Teacher Browser ── -->
  <rect x="10" y="120" width="130" height="60" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="75" y="148" text-anchor="middle" fill="#334155" font-size="12" font-weight="500">Teacher</text>
  <text x="75" y="166" text-anchor="middle" fill="#334155" font-size="12" font-weight="500">Browser</text>

  <!-- Browser → Pi -->
  <line x1="140" y1="150" x2="195" y2="150" stroke="#7c3aed" stroke-width="2" marker-end="url(#a2p)"/>
  <text x="168" y="142" text-anchor="middle" fill="#5b21b6" font-size="9">HTTP</text>

  <!-- ══ Pi box ══ -->
  <rect x="200" y="20" width="540" height="280" rx="12" fill="#f3f0ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="470" y="14" text-anchor="middle" fill="#5b21b6" font-size="12" font-weight="700">TEACHER LAPTOP</text>
  <text x="470" y="42" text-anchor="middle" fill="#666" font-size="10">WiFi AP: "Open Octave"  |  IP: 192.168.4.1</text>

  <!-- Frontend -->
  <rect x="230" y="58" width="490" height="45" rx="8" fill="#ede9fe"/>
  <text x="475" y="78" text-anchor="middle" fill="#4c1d95" font-size="12" font-weight="500">Web Frontend</text>
  <text x="475" y="94" text-anchor="middle" fill="#6d28d9" font-size="10">HTML/CSS/JS</text>

  <!-- Backend -->
  <rect x="230" y="120" width="490" height="45" rx="8" fill="#ede9fe"/>
  <text x="475" y="140" text-anchor="middle" fill="#4c1d95" font-size="12" font-weight="500">Backend (Express + WebSocket Server)</text>
  <text x="475" y="156" text-anchor="middle" fill="#6d28d9" font-size="10">State tracking, MIDI processing, command dispatch</text>

  <!-- DB -->
  <rect x="230" y="182" width="230" height="42" rx="8" fill="#e8edf4"/>
  <text x="345" y="202" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="500">SQLite Database</text>
  <text x="345" y="216" text-anchor="middle" fill="#475569" font-size="10">Sequences, songs, users</text>

  <!-- WS Server -->
  <rect x="480" y="182" width="240" height="42" rx="8" fill="#e8edf4"/>
  <text x="600" y="202" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="500">WS Server (:81)</text>
  <text x="600" y="216" text-anchor="middle" fill="#475569" font-size="10">Multi-device manager</text>

  <!-- hostapd -->
  <rect x="230" y="242" width="490" height="35" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="475" y="264" text-anchor="middle" fill="#475569" font-size="11">hostapd + dnsmasq (OS-level WiFi AP + DHCP)</text>

  <!-- Internal arrows: Frontend → Backend → DB/WS -->
  <line x1="475" y1="103" x2="475" y2="116" stroke="#888" stroke-width="1" marker-end="url(#a2)"/>
  <line x1="345" y1="165" x2="345" y2="178" stroke="#888" stroke-width="1" marker-end="url(#a2)"/>
  <line x1="600" y1="165" x2="600" y2="178" stroke="#888" stroke-width="1" marker-end="url(#a2)"/>

  <!-- ══ Keyboard Modules ══ -->

  <!-- Module 1 (Master) -->
  <rect x="60" y="400" width="210" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="165" y="420" text-anchor="middle" fill="#1d4ed8" font-size="11" font-weight="600">MODULE 1 (Master)</text>
  <rect x="80" y="430" width="170" height="26" rx="5" fill="#dbeafe"/>
  <text x="165" y="448" text-anchor="middle" fill="#1e3a5f" font-size="10">ESP32 (WS Client)</text>
  <rect x="80" y="462" width="170" height="26" rx="5" fill="#dbeafe"/>
  <text x="165" y="480" text-anchor="middle" fill="#1e3a5f" font-size="10">processSerialCommand()</text>
  <rect x="80" y="494" width="170" height="26" rx="5" fill="#f8fafc"/>
  <text x="165" y="512" text-anchor="middle" fill="#475569" font-size="10">12 Keys + LEDs + Servos</text>

  <!-- Module 2 -->
  <rect x="365" y="400" width="210" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="470" y="420" text-anchor="middle" fill="#1d4ed8" font-size="11" font-weight="600">MODULE 2</text>
  <rect x="385" y="430" width="170" height="26" rx="5" fill="#dbeafe"/>
  <text x="470" y="448" text-anchor="middle" fill="#1e3a5f" font-size="10">ESP32 (WS Client)</text>
  <rect x="385" y="462" width="170" height="26" rx="5" fill="#dbeafe"/>
  <text x="470" y="480" text-anchor="middle" fill="#1e3a5f" font-size="10">processSerialCommand()</text>
  <rect x="385" y="494" width="170" height="26" rx="5" fill="#f8fafc"/>
  <text x="470" y="512" text-anchor="middle" fill="#475569" font-size="10">12 Keys + LEDs + Servos</text>

  <!-- Module 3... -->
  <rect x="670" y="400" width="210" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="775" y="420" text-anchor="middle" fill="#1d4ed8" font-size="11" font-weight="600">MODULE 3...</text>
  <rect x="690" y="430" width="170" height="26" rx="5" fill="#dbeafe"/>
  <text x="775" y="448" text-anchor="middle" fill="#1e3a5f" font-size="10">ESP32 (WS Client)</text>
  <rect x="690" y="462" width="170" height="26" rx="5" fill="#dbeafe"/>
  <text x="775" y="480" text-anchor="middle" fill="#1e3a5f" font-size="10">processSerialCommand()</text>
  <rect x="690" y="494" width="170" height="26" rx="5" fill="#f8fafc"/>
  <text x="775" y="512" text-anchor="middle" fill="#475569" font-size="10">12 Keys + LEDs + Servos</text>

  <!-- ── Pi → Module arrows ── -->
  <line x1="300" y1="300" x2="165" y2="395" stroke="#7c3aed" stroke-width="2" marker-end="url(#a2p)"/>
  <line x1="470" y1="300" x2="470" y2="395" stroke="#7c3aed" stroke-width="2" marker-end="url(#a2p)"/>
  <line x1="640" y1="300" x2="775" y2="395" stroke="#7c3aed" stroke-width="2" marker-end="url(#a2p)"/>

  <!-- WebSocket label -->
  <text x="470" y="340" text-anchor="middle" fill="#5b21b6" font-size="10">WebSocket</text>
  <text x="470" y="355" text-anchor="middle" fill="#7c3aed" font-size="9" class="mono">commands ↓  logs ↑</text>

  <!-- ── Daisy chain arrows ── -->
  <line x1="270" y1="475" x2="360" y2="475" stroke="#d97706" stroke-width="2" marker-end="url(#a2y)"/>
  <text x="315" y="468" text-anchor="middle" fill="#b45309" font-size="9">UART</text>

  <line x1="575" y1="475" x2="665" y2="475" stroke="#d97706" stroke-width="2" marker-end="url(#a2y)"/>
  <text x="620" y="468" text-anchor="middle" fill="#b45309" font-size="9">UART</text>
</svg>
</div>

</body>
</html>
